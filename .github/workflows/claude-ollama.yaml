name: Claude Code via Ollama Cloud

# Routes anthropics/claude-code-action through Ollama Cloud's Anthropic-
# compatible API. Triggers:
# - workflow_dispatch: ad-hoc testing with a custom prompt.
# - pull_request opened: auto-review the PR.
# - issues opened: auto-triage the issue.
# - issue_comment / pull_request_review_comment: respond when @claude is mentioned.

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to send to Claude Code.
        required: true
        default: 'Summarize the top-level structure of this repository in 5 bullets.'
      model:
        description: Ollama Cloud model tag (e.g. glm-5.1, glm-4.6:cloud, qwen3-coder:480b-cloud, kimi-k2:cloud).
        required: true
        default: 'glm-5.1'
      max_turns:
        description: Max tool-use turns before the action aborts.
        required: true
        default: '15'
  pull_request:
    types: [opened]
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-ollama-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  run:
    # Gate on actor: only fire for events authored/triggered by JasperHG90.
    # On comments, additionally require an @claude mention.
    if: >-
      github.actor == 'JasperHG90' && (
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_BASE_URL: https://ollama.com
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.OLLAMA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build the prompt with event context interpolated. Comment events get
      # an empty prompt — the action's interactive mode reads the comment itself.
      - id: build_prompt
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_PROMPT: ${{ inputs.prompt }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          out=$(mktemp)
          case "$EVENT" in
            workflow_dispatch)
              printf '%s' "$DISPATCH_PROMPT" > "$out"
              ;;
            pull_request)
              {
                echo "Review pull request #${PR_NUM}. Focus on correctness, security, and obvious bugs."
                echo "Read the diff with \`gh pr diff ${PR_NUM}\` (or \`git diff origin/${PR_BASE}...HEAD\`)."
                echo "Post a single concise review with severity-tagged findings (Critical/High/Medium/Low)"
                echo "via \`gh pr review ${PR_NUM} --comment -F <file>\`. Do not run additional tools after posting."
                echo
                echo "## Title"
                echo "${PR_TITLE}"
                echo
                echo "## Body"
                echo "${PR_BODY:-(empty)}"
              } > "$out"
              ;;
            issues)
              {
                echo "Triage issue #${ISSUE_NUM}. Summarize the request, suggest a priority"
                echo "(critical/high/medium/low) and area labels, and ask any clarifying questions."
                echo "Post a single comment via \`gh issue comment ${ISSUE_NUM} -F <file>\`."
                echo "Do not run additional tools after posting."
                echo
                echo "## Title"
                echo "${ISSUE_TITLE}"
                echo
                echo "## Body"
                echo "${ISSUE_BODY:-(empty)}"
              } > "$out"
              ;;
            *)
              : > "$out"
              ;;
          esac
          {
            echo 'value<<__EOF__'
            cat "$out"
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.OLLAMA_API_KEY }}
          prompt: ${{ steps.build_prompt.outputs.value }}
          claude_args: |
            --model ${{ inputs.model || 'glm-5.1' }}
            --max-turns ${{ inputs.max_turns || '15' }}
            --verbose

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-output-${{ github.run_id }}-${{ github.run_attempt }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: warn
          retention-days: 14
