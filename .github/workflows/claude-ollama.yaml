name: Claude Code via Ollama Cloud

# Routes anthropics/claude-code-action through Ollama Cloud's Anthropic-
# compatible API. Triggers:
# - workflow_dispatch: ad-hoc testing with a custom prompt.
# - pull_request opened: auto-review the PR.
# - issues opened: auto-triage the issue.
# - issue_comment / pull_request_review_comment: respond when @claude is mentioned.

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to send to Claude Code.
        required: true
        default: 'Summarize the top-level structure of this repository in 5 bullets.'
      model:
        description: Ollama Cloud model tag (e.g. glm-4.6:cloud, qwen3-coder:480b-cloud, kimi-k2:cloud).
        required: true
        default: 'glm-4.6:cloud'
      max_turns:
        description: Max tool-use turns before the action aborts.
        required: true
        default: '15'
  pull_request:
    types: [opened]
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-ollama-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  run:
    # Run on dispatch / PR-open / issue-open unconditionally; on comments only when @claude is mentioned.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_BASE_URL: https://ollama.com
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.OLLAMA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.OLLAMA_API_KEY }}
          # Comment events: leave prompt empty so the action reads the comment.
          # Other events: provide an explicit prompt.
          prompt: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.prompt
            || github.event_name == 'pull_request' && 'Review this pull request. Focus on correctness, security, and obvious bugs. Post a concise review with severity-tagged findings.'
            || github.event_name == 'issues' && 'Triage this issue: summarize the request, suggest a priority and area labels, and ask any clarifying questions.'
            || '' }}
          claude_args: |
            --model ${{ inputs.model || 'glm-4.6:cloud' }}
            --max-turns ${{ inputs.max_turns || '15' }}
            --verbose

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-output-${{ github.run_id }}-${{ github.run_attempt }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: warn
          retention-days: 14
