repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-ast
      - id: check-merge-conflict
      - id: check-yaml
        args: [--unsafe]
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
  - repo: local
    hooks:
      - id: nomad-fmt
        name: Nomad Format (fmt -recursive)
        entry: nomad fmt -recursive
        language: system
        types: [hcl]
        files: '\.hcl$'
        # hermes.hcl uses templatefile() control directives (%{ for }) at
        # top level, which aren't valid HCL — nomad fmt can't parse it.
        exclude: '^deployments/applications/services/hermes\.hcl$'
