---
- name: Configure Consul worker
  hosts: worker
  become: true
  roles:
    - role: consul_client
      vars:
        consul_client_server_address: "192.168.2.30"
        consul_client_server_agent_token_secret: "{{ lookup('env', 'CONSUL_AGENT_TOKEN_SECRET') }}"

- name: Configure Nomad worker
  hosts: worker
  become: true
  roles:
    - role: nomad_client
      vars:
        nomad_client_server_address: "192.168.2.30"
        nomad_client_server_consul_token_secret: "{{ lookup('env', 'NOMAD_CONSUL_TOKEN_SECRET') }}"
