---
- name: Configure Consul server
  hosts: server
  become: true
  roles:
    - role: consul_server
      vars:
        consul_server_ip: "192.168.2.30"
        consul_server_agent_token_secret: "{{ lookup('env', 'CONSUL_AGENT_TOKEN_SECRET') }}"
        consul_services:
          - name: "minio"
            id: "minio"
            port: 9001
            address: "192.168.2.32"
            tags:
              - "http"
              - "s3"
            check:
              name: "minio health check (curl)"
              type: "http"
              http: "http://192.168.2.32:9000/minio/health/live"
              method: "GET"
              status: "passing"
              interval: "10s"
              timeout: "5s"

          - name: "docker registry"
            id: "docker"
            port: 5001
            address: "192.168.2.30"
            tags:
              - "http"
            check:
              name: "docker registry health check (curl)"
              type: "script"
              script_name: "docker_registry_health_check.sh"
              interval: "10s"
              timeout: "5s"
              user: "localstack"
              pass: "{{ lookup('env', 'DOCKER_REGISTRY_PASSWORD') }}"
              url: "http://192.168.2.30:5001"

          - name: "docker registry v2"
            id: "docker-v2"
            port: 5000
            address: "192.168.2.30"
            tags:
              - "http"
            check:
              name: "docker registry v2 health check (curl)"
              type: "script"
              script_name: "docker_registry_v2_health_check.sh"
              interval: "10s"
              timeout: "5s"
              user: "localstack"
              pass: "{{ lookup('env', 'DOCKER_REGISTRY_PASSWORD') }}"
              url: "http://192.168.2.30:5000/v2/"

- name: Configure Vault server
  hosts: server
  become: true
  roles:
    - role: vault_server
      vars:
        vault_server_ip_address: "192.168.2.30"
        vault_server_consul_token_secret: "{{ lookup('env', 'VAULT_CONSUL_TOKEN_SECRET') }}"

- name: Configure Nomad server
  hosts: server
  become: true
  roles:
    - role: nomad_server
      vars:
        nomad_server_ip_address: "192.168.2.30"
        nomad_server_consul_token_secret: "{{ lookup('env', 'NOMAD_CONSUL_TOKEN_SECRET') }}"
        nomad_server_host_volumes:
          - name: postgres-host-data
            path: /var/lib/postgres-nomad-data
            read_only: false
