---
- name: Format and mount drive for MinIO storage
  hosts: orange_pi_rv2
  become: yes
  
  roles:
    - role: format_drive
      vars:
        format_drive_partition: "/dev/nvme0n1"
        format_mount_point: "/mnt/minio_data"
        format_drive_force: false # Set to true to force reformatting

- name: Configure MinIO Service
  hosts: orange_pi_rv2
  become: true
  roles:
    - role: minio
      vars:
        minio_root_password: "{{ lookup('env', 'MINIO_ROOT_PASSWORD') }}"
        # NB: requires that the minio image is pushed to this registry beforehand
        minio_docker_registry_url: "localstack.local:5000"
