---
- name: Firewall base rules — manager
  hosts: manager
  become: true

  roles:
    - role: firewall
      vars:
        firewall_ufw_ports:
          - { port: 22, from_ip: "192.168.0.0/16" }
          - { port: 22, from_ip: "100.64.0.0/10" }
          # Consul server
          - { port: 8500, proto: tcp, from_ip: "192.168.0.0/16" }
          - { port: 8300, proto: tcp, from_ip: "192.168.0.0/16" }
          - { port: 8301, from_ip: "192.168.0.0/16" }
          - { port: 8600, from_ip: "192.168.0.0/16" }
          # Vault
          - { port: 8200, proto: tcp, from_ip: "192.168.0.0/16" }
          - { port: 8201, proto: tcp, from_ip: "192.168.0.0/16" }
          # Nomad server
          - { port: 4646, proto: tcp, from_ip: "192.168.0.0/16" }
          - { port: 4647, proto: tcp, from_ip: "192.168.0.0/16" }
          - { port: 4648, from_ip: "192.168.0.0/16" }
          # Nomad dynamic ports
          - { port: "20000:32000", proto: tcp, from_ip: "192.168.0.0/16" }

- name: Firewall base rules — workers
  hosts: worker
  become: true

  roles:
    - role: firewall
      vars:
        firewall_ufw_ports:
          - { port: 22, from_ip: "192.168.0.0/16" }
          # Consul client
          - { port: 8301, from_ip: "192.168.0.0/16" }
          - { port: 8300, proto: tcp, from_ip: "192.168.0.0/16" }
          - { port: 8500, proto: tcp, from_ip: "192.168.0.0/16" }
          - { port: 8600, from_ip: "192.168.0.0/16" }
          # Nomad client
          - { port: 4646, proto: tcp, from_ip: "192.168.0.0/16" }
          - { port: 4647, from_ip: "192.168.0.0/16" }
          - { port: 4648, proto: tcp, from_ip: "192.168.0.0/16" }
          # Nomad dynamic ports
          - { port: "20000:32000", proto: tcp, from_ip: "192.168.0.0/16" }
