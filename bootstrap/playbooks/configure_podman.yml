---
- name: Configure Podman runtime
  hosts: all
  become: true

  tasks:
    - name: Ensure lingering is enabled for {{ ansible_user }}
      ansible.builtin.command: loginctl enable-linger {{ ansible_user }}
      when: ansible_service_mgr == "systemd" # Only run on systemd systems
      changed_when: false
      register: user_linger_status

    - name: Configure rootless Podman (set crun runtime)
      ansible.builtin.blockinfile:
        path: "/home/{{ ansible_user }}/.config/containers/containers.conf"
        create: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
        block: |
          [engine]
          runtime = "crun"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - PODMAN ROOTLESS CONFIG"

    - name: Log in to GitHub Container Registry
      become_user: "{{ ansible_user }}"
      ansible.builtin.command:
        cmd: podman login ghcr.io -u {{ github_user }} -p {{ github_pat }}
      changed_when: true
      no_log: true
      when: github_user is defined and github_pat is defined
