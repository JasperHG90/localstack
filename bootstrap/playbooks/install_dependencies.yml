---
- name: Configure Cluster Node Prerequisites
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache and upgrade installed packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        dpkg_options: "force-confdef,force-confold"
      notify: Reboot_server
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - git
          - curl
          - wget
          - gpg
          - crun
          - podman
          - avahi-daemon
          - coreutils
          - python3-pip
          - apache2-utils
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

  handlers:
    # This task is defined but will only run when notified
    - name: Reboot_server
      ansible.builtin.reboot:
        reboot_timeout: 600

- name: Install additional dependencies
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install additional dependencies
      ansible.builtin.apt:
        name:
          - ufw
          - uidmap
          - fuse-overlayfs
          - slirp4netns
          - avahi-daemon
          - libnss-mdns
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive

  handlers:
    # This task is defined but will only run when notified
    - name: Reboot_server
      ansible.builtin.reboot:
        reboot_timeout: 600

- name: Install HashiStack Components
  hosts: manager, worker
  become: true
  gather_facts: true

  vars:
    hashicorp_arch_map:
      aarch64: arm64
      x86_64: amd64
    hashicorp_arch: "{{ hashicorp_arch_map[ansible_architecture] | default(ansible_architecture) }}"

  tasks:
    - name: Add HashiCorp GPG key
      ansible.builtin.shell:
        cmd: wget -O - https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Add HashiCorp repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ hashicorp_arch }} signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        state: present
        filename: hashicorp

    - name: Install Hashistack products
      ansible.builtin.apt:
        name:
          - consul
          - vault
          - nomad
          - nomad-driver-podman
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive

- name: Install CNI plugins
  hosts: all
  become: true
  vars:
    hashicorp_arch_map:
      aarch64: arm64
      x86_64: amd64
    hashicorp_arch: "{{ hashicorp_arch_map[ansible_architecture] | default(ansible_architecture) }}"
  tasks:
    - name: Download CNI plugins
      ansible.builtin.get_url:
        url: "https://github.com/containernetworking/plugins/releases/download/v1.1.1/cni-plugins-linux-{{ hashicorp_arch }}-v1.1.1.tgz"
        dest: "/tmp/cni-plugins.tgz"
        mode: '0644'

    - name: Ensure CNI bin directory exists
      ansible.builtin.file:
        path: /opt/cni/bin
        state: directory
        mode: '0755'

    - name: Extract CNI plugins
      ansible.builtin.unarchive:
        src: "/tmp/cni-plugins.tgz"
        dest: "/opt/cni/bin/"
        remote_src: true

- name: Configure bridge networking prerequisites
  hosts: all
  become: true
  tasks:
    - name: Load br_netfilter kernel module
      community.general.modprobe:
        name: br_netfilter
        state: present

    - name: Create bridge.conf for sysctl
      ansible.builtin.copy:
        dest: /etc/sysctl.d/bridge.conf
        content: |
          net.bridge.bridge-nf-call-arptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.bridge.bridge-nf-call-iptables = 1
      notify: Apply sysctl

  handlers:
    - name: Apply sysctl
      ansible.builtin.command:
        cmd: sysctl --system
