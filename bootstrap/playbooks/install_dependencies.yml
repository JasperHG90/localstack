---
- name: Configure Cluster Node Prerequisites
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache and upgrade installed packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        dpkg_options: "force-confdef,force-confold"
      notify: Reboot_server
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - git
          - curl
          - wget
          - gpg
          - crun
          - podman
          - avahi-daemon
          - coreutils
          - python3-pip
          - podman-compose
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Install OrangePi-specific dependencies
      ansible.builtin.apt:
        name:
          - ufw
          - uidmap
          - fuse-overlayfs
          - slirp4netns
          - avahi-daemon
          - libnss-mdns
        state: present
        update_cache: true
      when:
        - inventory_hostname in groups['orange_pi_rv2']
      environment:
        DEBIAN_FRONTEND: noninteractive

  handlers:
    # This task is defined but will only run when notified
    - name: Reboot_server
      ansible.builtin.reboot:
        reboot_timeout: 600

- name: Install HashiStack Components
  hosts: server,client
  become: true
  gather_facts: true

  vars:
    hashicorp_arch_map:
      aarch64: arm64
      x86_64: amd64
    hashicorp_arch: "{{ hashicorp_arch_map[ansible_architecture] | default(ansible_architecture) }}"

  tasks:
    - name: Add HashiCorp GPG key
      ansible.builtin.shell:
        cmd: wget -O - https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Add HashiCorp repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ hashicorp_arch }} signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        state: present
        filename: hashicorp

    - name: Install Hashistack products
      ansible.builtin.apt:
        name:
          - consul
          - vault
          - nomad
          - nomad-driver-podman
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive
