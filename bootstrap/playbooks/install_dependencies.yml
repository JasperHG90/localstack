---
- name: Configure Cluster Node Prerequisites
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache and upgrade installed packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
      notify: Reboot_server

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - git
          - curl
          - wget
          - gpg
          - crun
          - podman
          - python3-pip
          - podman-compose
        state: present

    - name: Install OrangePi-specific dependencies
      ansible.builtin.apt:
        name:
          - ufw
          - uidmap
          - fuse-overlayfs
          - slirp4netns
          - avahi-daemon
          - libnss-mdns
        state: present
        update_cache: true
      when:
        - inventory_hostname in groups['orange_pi_rv2']

  handlers:
    # This task is defined but will only run when notified
    - name: Reboot_server
      ansible.builtin.reboot:
        reboot_timeout: 600
