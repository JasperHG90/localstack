---
- name: Create consul settings directory
  ansible.builtin.file:
    path: "/opt/consul"
    state: directory
    mode: '0755'

- name: Ensure consul config directory exists and has correct permissions
  ansible.builtin.file:
    path: /etc/consul.d
    state: directory
    owner: consul
    group: consul
    mode: '0755'

- name: Ensure consul data directory exists and has correct permissions
  ansible.builtin.file:
    path: /var/lib/consul
    state: directory
    owner: consul
    group: consul
    mode: '0755'

- name: Create systemd override directory for Consul
  ansible.builtin.file:
    path: /etc/systemd/system/consul.service.d
    state: directory
    mode: '0755'

- name: Ensure Consul waits for network to be online
  ansible.builtin.copy:
    dest: /etc/systemd/system/consul.service.d/wait-for-network.conf
    content: |
      [Unit]
      After=network-online.target
      Wants=network-online.target
    mode: '0644'
  notify: Restart consul

- name: Template Consul configuration
  ansible.builtin.template:
    src: consul.hcl.j2
    dest: /etc/consul.d/consul.hcl
    owner: consul
    group: consul
    mode: '0644'
  notify: Restart consul

- name: Ensure Consul service is started and enabled
  ansible.builtin.service:
    name: consul
    state: started
    enabled: true
