# NB: 'auth' and 'data' directories must exist, and htpasswd file must be created.

version: '3.8'

services:
  registry:
    image: registry:3
    container_name: localstack-docker-registry
    restart: always
    ports:
      - "5000:5000"
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: Registry Realm
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - ./data:/var/lib/registry
      - ./auth:/auth
    networks:
      - registry-net

  registry-ui:
    image: docker.io/joxit/docker-registry-ui:main
    container_name: local-docker-registry-ui
    restart: always
    ports:
      - "5001:80"
    environment:
      SINGLE_REGISTRY: "true"
      REGISTRY_TITLE: "Localstack docker registry"
      NGINX_PROXY_PASS_URL: http://registry:5000
      DELETE_IMAGES: "true"
      SHOW_CONTENT_DIGEST: "true"
    depends_on:
      - registry
    networks:
      - registry-net

networks:
  registry-net:
    driver: bridge
