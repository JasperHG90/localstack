---
- name: Create docker_registry directory
  ansible.builtin.file:
    path: /opt/docker_registry
    state: directory
    mode: '0755'

- name: Copy docker-compose file
  ansible.builtin.copy:
    src: docker-compose.yaml
    dest: /opt/docker_registry/docker-compose.yaml
    mode: '0644'

- name: Create data and auth directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/docker_registry/data
    - /opt/docker_registry/auth

- name: Install htpasswd
  ansible.builtin.package:
    name: apache2-utils
    state: present

- name: Install passlib
  ansible.builtin.pip:
    name:
      - passlib
      - requests
    state: present
    executable: pip3
    extra_args: --break-system-packages
  become: true

- name: Generate htpasswd file
  community.general.htpasswd:
    path: /opt/docker_registry/auth/htpasswd
    name: localstack
    password: "{{ docker_registry_password }}"
    owner: root
    group: root
    mode: '0644'
    crypt_scheme: bcrypt

- name: Change ownership of docker_registry directory
  ansible.builtin.file:
    path: /opt/docker_registry
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    recurse: true

- name: Copy systemd service file
  ansible.builtin.copy:
    src: docker_registry.service
    dest: "/home/{{ ansible_user }}/.config/systemd/user/localstack-registry.service"
    mode: '0644'
  become: false

- name: Enable and start systemd service
  ansible.builtin.systemd:
    name: localstack-registry.service
    scope: user
    enabled: true
    state: started
    daemon_reload: true
  become: false
