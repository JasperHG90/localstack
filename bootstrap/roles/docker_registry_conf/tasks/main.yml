---
- name: Ensure Podman insecure registries configuration directory exists
  ansible.builtin.file:
    path: /etc/containers/registries.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Add insecure registries configuration file
  ansible.builtin.copy:
    src: insecure_registries.conf
    dest: /etc/containers/registries.conf.d/insecure_registries.conf
    owner: root
    group: root
    mode: '0644'
