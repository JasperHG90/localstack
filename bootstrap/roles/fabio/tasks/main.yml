---
- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/containers/systemd/"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  become: true

- name: Read the stored Consul bootstrap token
  ansible.builtin.slurp:
    src: /opt/consul/bootstrap_token
  register: stored_bootstrap_token

- name: Set master_consul_token fact
  ansible.builtin.set_fact:
    master_consul_token: "{{ stored_bootstrap_token['content'] | b64decode }}"

- name: Create Fabio policy for Consul
  community.general.consul_policy:
    name: "fabio_policy"
    rules: "{{ lookup('file', 'consul_fabio_policy.hcl') }}"
    token: "{{ master_consul_token }}"

- name: Ensure /opt/fabio directory exists
  ansible.builtin.file:
    path: /opt/fabio
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Check if Fabio token exists
  ansible.builtin.stat:
    path: /opt/fabio/consul_token
  register: fabio_token_stat

- name: Create Fabio token for Consul if it does not exist
  when: not fabio_token_stat.stat.exists
  block:
    - name: Create token
      community.general.consul_token:
        description: "Fabio token"
        policies:
          - name: "fabio_policy"
        token: "{{ master_consul_token }}"
      register: fabio_consul_token_create

    - name: Store Fabio's Consul token
      ansible.builtin.copy:
        content: "{{ fabio_consul_token_create.token.SecretID }}"
        dest: /opt/fabio/consul_token
        owner: root
        group: root
        mode: '0600'

- name: Read the stored Fabio Consul token
  ansible.builtin.slurp:
    src: /opt/fabio/consul_token
  register: stored_fabio_consul_token

- name: Set fabio_consul_token fact
  ansible.builtin.set_fact:
    fabio_consul_token: "{{ stored_fabio_consul_token['content'] | b64decode }}"

- name: Create companion service files directory
  ansible.builtin.file:
    path: /etc/consul.d/fabio-services
    state: directory
    owner: consul
    group: consul
    mode: '0755'

- name: Copy companion service files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/consul.d/fabio-services/{{ item }}"
    owner: consul
    group: consul
    mode: '0644'
  loop:
    - consul-ui.json
    - vault-ui.json
    - nomad-ui.json
  notify: Restart consul

- name: Create systemd directory for containers
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    mode: '0755'

- name: Template fabio container config
  ansible.builtin.template:
    src: fabio.container.j2
    dest: "/home/{{ ansible_user }}/.config/containers/systemd/fabio.container"
    mode: '0644'
  become: false
  register: fabio_quadlet_file

- name: Reload systemd user daemon if the container file changed
  ansible.builtin.systemd:
    scope: user
    daemon_reload: true
  become: false
  when: fabio_quadlet_file.changed

- name: Enable and start fabio service
  ansible.builtin.systemd:
    name: fabio.service
    scope: user
    enabled: true
    state: started
  become: false
