---
- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/containers/systemd/"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  become: true

- name: Check if minio image exists locally
  containers.podman.podman_image_info:
    name: "{{ minio_docker_registry_url }}/minio"
  register: minio_image_check
  become: false

- name: Attempt to pull minio image if it does not exist
  ansible.builtin.command:
    cmd: "podman pull {{ minio_docker_registry_url }}/minio"
  become: false
  when: not minio_image_check.images
  register: pull_result
  changed_when: "'Successfully tagged' in pull_result.stdout"
  failed_when: false

- name: Report pull failure if any
  ansible.builtin.debug:
    msg: "Failed to pull minio image. This is not a fatal error. Error: {{ pull_result.stderr }}. Push the image to {{ docker_registry_url }} and try again."
  when:
    - not minio_image_check.images
    - pull_result.rc != 0

- name: Configure and start MinIO service if image exists
  when: minio_image_check.images | length > 0 or (pull_result is defined and pull_result.rc == 0)
  block:
    - name: Template the MinIO container definition file
      ansible.builtin.template:
        src: minio.j2
        dest: "/home/{{ ansible_user }}/.config/containers/systemd/minio.container"
        mode: '0644'
      become: false
      register: minio_quadlet_file

    - name: Reload systemd user daemon if the container file changed
      ansible.builtin.systemd:
        scope: user
        daemon_reload: true
      become: false
      when: minio_quadlet_file.changed

    - name: Enable and start the MinIO user service
      ansible.builtin.systemd:
        name: minio.service
        scope: user
        state: started
        enabled: true
      become: false
