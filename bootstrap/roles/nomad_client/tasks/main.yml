---
- name: Ensure /opt/nomad directory exists
  ansible.builtin.file:
    path: /opt/nomad
    state: directory
    owner: nomad
    group: nomad
    mode: '0755'

- name: Ensure Nomad data directory exists and has correct permissions
  ansible.builtin.file:
    path: /opt/nomad/data
    state: directory
    owner: nomad
    group: nomad
    mode: '0755'

- name: Ensure Nomad plugins directory exists and has correct permissions
  ansible.builtin.file:
    path: /opt/nomad/plugins
    state: directory
    owner: nomad
    group: nomad
    mode: '0755'

- name: Ensure Nomad config directory exists and has correct permissions
  ansible.builtin.file:
    path: /etc/nomad.d
    state: directory
    owner: nomad
    group: nomad
    mode: '0755'

- name: Ensure Nomad data directory exists and has correct permissions
  ansible.builtin.file:
    path: /var/lib/nomad
    state: directory
    owner: nomad
    group: nomad
    mode: '0755'

- name: Create systemd override directory for Nomad
  ansible.builtin.file:
    path: /etc/systemd/system/nomad.service.d
    state: directory
    mode: '0755'

- name: Ensure Nomad waits for network to be online
  ansible.builtin.copy:
    dest: /etc/systemd/system/nomad.service.d/wait-for-network.conf
    content: |
      [Unit]
      After=network-online.target
      Wants=network-online.target
    mode: '0644'
  notify: Restart nomad

- name: Template Nomad configuration
  ansible.builtin.template:
    src: nomad.hcl.j2
    dest: /etc/nomad.d/nomad.hcl
    owner: nomad
    group: nomad
    mode: '0644'
  notify: Restart nomad

- name: Ensure Nomad service is started and enabled
  ansible.builtin.service:
    name: nomad
    state: started
    enabled: true
