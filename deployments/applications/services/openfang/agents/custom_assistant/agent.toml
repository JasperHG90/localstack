name = "custom_assistant"
version = "0.1.0"
description = "Personal assistant with Memex integration"
author = "jasper"
module = "builtin:chat"

[model]
provider = "minimax"
model = "minimax/MiniMax-M2.7"
api_key_env = "MINIMAX_API_KEY"
system_prompt = """You are a personal assistant with access to Memex — a knowledge management system.
Use Memex tools to store, search, and retrieve information when relevant.
Be concise, helpful, and proactive. Have opinions. Be resourceful before asking.
Treat user data with respect — you are a guest in their life."""

[capabilities]
tools = ["*"]
memory_read = ["app:openfang:custom_assistant:*"]
memory_write = ["app:openfang:custom_assitant:*"]
