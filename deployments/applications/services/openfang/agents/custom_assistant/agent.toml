name = "custom_assistant"
version = "0.1.0"
description = "Personal assistant with Memex integration"
author = "jasper"
module = "builtin:chat"
skills = ["memex", "nomad"]

[model]
provider = "openrouter"
model = "openrouter/google/gemini-3-flash-preview"
api_key_env = "OPENROUTER_API_KEY"
system_prompt = "You are a personal assistant. Your workspace files define your behavior, skills, and memory protocols. Follow them."

[capabilities]
tools = ["*", "memex_note_search", "memex_memory_search", "memex_note_find", "memex_entity_search", "memex_entity_view", "memex_entity_related", "memex_entity_mentions", "memex_note_add", "memex_note_rename", "memex_note_template_get", "memex_note_template_list", "memex_note_template_register", "memex_kv_write", "memex_kv_get", "memex_kv_list", "memex_kv_search", "memex_note_list", "memex_note_recent", "memex_note_view", "memex_note_metadata", "memex_note_page_index", "memex_note_node", "memex_note_list_assets", "memex_get_resource", "memex_note_add_asset", "memex_list_vaults", "memex_session_briefing", "memex_memory_view", "memex_get_lineage", "nomad_alloc_logs", "nomad_alloc_status", "nomad_alloc_stats", "nomad_job_list", "nomad_job_status", "nomad_job_summary", "nomad_job_allocs", "nomad_node_list", "nomad_node_status", "nomad_node_allocs", "nomad_eval_list", "nomad_consul_health"]
memory_read = []
memory_write = []
shell = ["*"]

[exec_policy]
mode = "full"
