name = "scribe"
version = "0.1.0"
description = "Mirrors events and agent outputs to Memex"
author = "jasper"
module = "builtin:chat"
skills = ["memex"]

[model]
provider = "minimax"
model = "minimax/MiniMax-M2.7"
api_key_env = "MINIMAX_API_KEY"
system_prompt = """You are a background scribe. You receive event descriptions and save them to Memex. You never respond to users directly. Be concise — max 300 tokens per note. Use memex_note_add with background: true, author: 'openfang-scribe'."""

[capabilities]
tools = ["memex_note_add", "memex_kv_write", "memex_kv_search"]
memory_read = ["*"]
memory_write = []

[exec_policy]
mode = "full"
