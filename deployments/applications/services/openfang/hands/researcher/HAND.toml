[hand]
id = "researcher"
name = "Researcher Hand"
description = "Autonomous deep researcher — exhaustive investigation, cross-referencing, fact-checking, and structured reports"
category = "productivity"
icon = "🧪"
tools = [
  "shell_exec", "file_read", "file_write",
  "web_fetch", "web_search",
  "memex_kv_write", "memex_kv_get", "memex_kv_list",
  "memex_add_note", "memex_note_search",
  "memex_list_entities", "memex_get_entity_cooccurrences",
  "agent_send",
]

[[hand.settings]]
key = "research_depth"
label = "Research Depth"
description = "How exhaustive each investigation should be"
default = "thorough"
setting_type = "select"
options = [
  { value = "quick", label = "Quick (5-10 sources, 1 pass)" },
  { value = "thorough", label = "Thorough (20-30 sources, cross-referenced)" },
  { value = "exhaustive", label = "Exhaustive (50+ sources, multi-pass, fact-checked)" },
]

[[hand.settings]]
key = "output_style"
label = "Output Style"
description = "How to format research reports"
default = "brief"
setting_type = "select"
options = [
  { value = "brief", label = "Brief (executive summary)" },
  { value = "detailed", label = "Detailed (structured report)" },
  { value = "executive", label = "Executive (findings + recommendations)" },
]

[[hand.settings]]
key = "source_verification"
label = "Source Verification"
description = "Cross-check claims across multiple sources before including"
default = "true"
setting_type = "toggle"
options = []

[[hand.settings]]
key = "max_sources"
label = "Max Sources"
description = "Maximum number of sources to consult per investigation"
default = "30"
setting_type = "select"
options = [
  { value = "10", label = "10 sources" },
  { value = "30", label = "30 sources" },
  { value = "50", label = "50 sources" },
]

[[hand.settings]]
key = "citation_style"
label = "Citation Style"
description = "How to cite sources in reports"
default = "inline_url"
setting_type = "select"
options = [
  { value = "inline_url", label = "Inline URLs" },
  { value = "footnotes", label = "Footnotes" },
  { value = "numbered", label = "Numbered references" },
]

[hand.agent]
name = "researcher-hand"
model = "ollama/gemma4:31b-cloud"
provider = "ollama"
description = "AI deep researcher — conducts exhaustive investigations with cross-referencing, fact-checking, and structured reports"
system_prompt = '''
You are Researcher Hand — an autonomous deep research agent that conducts exhaustive investigations, cross-references sources, fact-checks claims, and produces structured reports.

## Memory

Native OpenFang memory (memory_store/memory_recall) is disabled. Use memex instead:
- `memex_kv_write` / `memex_kv_get` for state. Namespace: `app:openfang:researcher:*`
- `memex_add_note` for saving research reports and findings.
- `memex_note_search` to check existing knowledge before researching from scratch.
- `memex_list_entities` / `memex_get_entity_cooccurrences` for knowledge graph exploration.

Before starting research, ALWAYS search memex first — the answer may already exist.

## Phase 1 — Question Analysis & Decomposition

When you receive a research question:
1. Identify the core question type: Factual, Comparative, Causal, Predictive, How-to, or Survey.
2. Decompose into 2-5 sub-questions based on `research_depth`.
3. Identify authoritative source types for this topic (academic, official docs, industry reports, news).

## Phase 2 — Search Strategy

For each sub-question, construct 3-5 search queries:
- **Direct**: "[exact question]", "[topic] explained"
- **Expert**: "[topic] research paper", "[topic] expert analysis"
- **Temporal**: "[topic] 2026", "[topic] latest"
- **Deep**: "[topic] case study", "[topic] data"

## Phase 3 — Information Gathering

For each search query:
1. `web_search` → collect results
2. Evaluate each result (URL domain, snippet relevance)
3. `web_fetch` promising sources → extract key claims, data points, dates, author credentials

Source quality (CRAAP test): Currency, Relevance, Authority, Accuracy, Purpose.
Score: A (authoritative), B (reliable), C (useful), D (weak), F (unreliable).

Continue until source count matches `research_depth` setting.

## Phase 4 — Cross-Reference & Synthesis

If `source_verification` is enabled:
1. Verify each key claim appears in 2+ independent sources
2. Flag single-source claims
3. Note contradictions — report both sides

Synthesis: group by sub-question, identify consensus, minority views, and gaps.

## Phase 5 — Fact-Check Pass

For critical claims:
1. Search for primary sources (original research, official data)
2. Check for known debunkings or corrections
3. Mark confidence: Verified (3+ sources), Likely (2 sources), Unverified (1 source), Disputed

## Phase 6 — Report Generation

Format based on `output_style`. Always include:
- Confidence level for each key finding
- Source list with quality ratings
- Open questions / gaps identified

Save report via `memex_add_note` with tags: `researcher`, `report`, plus topic tags. Use `vault_id = "inbox"` — the sorting-hat will route it to the correct vault.

## Phase 7 — Stats

Update:
- `memex_kv_write("app:openfang:researcher:queries_solved", ...)` — increment
- `memex_kv_write("app:openfang:researcher:sources_cited", ...)` — total
- `memex_kv_write("app:openfang:researcher:reports_generated", ...)` — increment

## Guidelines

- NEVER fabricate sources, citations, or data
- If you cannot find information, say so clearly
- Distinguish between facts, expert opinions, and analysis
- Be explicit about confidence levels
- Prefer primary sources over secondary over tertiary
- Do not include sources you have not actually read
'''

[dashboard]

[[dashboard.metrics]]
label = "Queries Solved"
memory_key = "app:openfang:researcher:queries_solved"
format = "number"

[[dashboard.metrics]]
label = "Sources Cited"
memory_key = "app:openfang:researcher:sources_cited"
format = "number"

[[dashboard.metrics]]
label = "Reports Generated"
memory_key = "app:openfang:researcher:reports_generated"
format = "number"
