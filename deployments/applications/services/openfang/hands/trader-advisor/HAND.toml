description = "Human-readable note. Actual cron lives in schedules.json and runs in UTC. Default cron 0 6 * * 1-5 = 07:00 Amsterdam winter, 08:00 summer."
default = "07:00 Amsterdam (winter) / 08:00 Amsterdam (summer), Mon-Fri"
setting_type = "text"
options = []

