[skill]
name = "github"
version = "0.1.0"
description = "GitHub tools for viewing repos, creating issues and PRs. Uses the gh CLI (authenticated via GH_TOKEN env var)."
author = "jasper"

[runtime]
type = "python"
entry = "src/main.py"

[requirements]
capabilities = ["EnvRead(GH_TOKEN)"]

# --- Repository ---

[[tools.provided]]
name = "github_repo_view"
description = "Get repository metadata: description, primary language, topics, default branch, and visibility."
input_schema = { type = "object", properties = { repo = { type = "string", description = "Repository in owner/repo format" } }, required = ["repo"] }

[[tools.provided]]
name = "github_repo_readme"
description = "Get the raw README content of a repository."
input_schema = { type = "object", properties = { repo = { type = "string", description = "Repository in owner/repo format" } }, required = ["repo"] }

[[tools.provided]]
name = "github_file_read"
description = "Read a file from a repository at a given ref (branch, tag, or SHA). Returns the raw file content."
input_schema = { type = "object", properties = { repo = { type = "string", description = "Repository in owner/repo format" }, path = { type = "string", description = "File path within the repo" }, ref = { type = "string", description = "Branch, tag, or commit SHA (default: default branch)" } }, required = ["repo", "path"] }

# --- Issues ---

[[tools.provided]]
name = "github_issue_create"
description = "Create a new issue in a repository."
input_schema = { type = "object", properties = { repo = { type = "string", description = "Repository in owner/repo format" }, title = { type = "string", description = "Issue title" }, body = { type = "string", description = "Issue body (markdown)" }, labels = { type = "array", items = { type = "string" }, description = "Labels to apply" } }, required = ["repo", "title", "body"] }

[[tools.provided]]
name = "github_issue_list"
description = "List issues in a repository, optionally filtered by label or state."
input_schema = { type = "object", properties = { repo = { type = "string", description = "Repository in owner/repo format" }, label = { type = "string", description = "Filter by label" }, state = { type = "string", description = "Filter by state: open, closed, all (default: open)" }, limit = { type = "integer", description = "Max issues to return (default: 20)" } }, required = ["repo"] }

# --- Pull Requests ---

[[tools.provided]]
name = "github_pr_create"
description = "Create a pull request. The head branch must already exist on the remote."
input_schema = { type = "object", properties = { repo = { type = "string", description = "Repository in owner/repo format" }, title = { type = "string", description = "PR title" }, body = { type = "string", description = "PR body (markdown)" }, head = { type = "string", description = "Head branch name" }, base = { type = "string", description = "Base branch name (default: repo default branch)" }, labels = { type = "array", items = { type = "string" }, description = "Labels to apply" } }, required = ["repo", "title", "body", "head"] }

# --- Labels ---

[[tools.provided]]
name = "github_label_ensure"
description = "Ensure a label exists in a repository. Creates it if missing, no-ops if it already exists."
input_schema = { type = "object", properties = { repo = { type = "string", description = "Repository in owner/repo format" }, name = { type = "string", description = "Label name" }, color = { type = "string", description = "Hex color without # (default: 7057ff)" }, description = { type = "string", description = "Label description" } }, required = ["repo", "name"] }
