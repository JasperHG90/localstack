[skill]
name = "memex"
version = "0.5.0"
description = "Your long-term memory and knowledge base. ALL memory persistence goes through this skill — native OpenFang memory is disabled. Use these tools for every knowledge question, preference storage, note-taking, entity exploration, and fact retrieval. Always search Memex before answering knowledge questions or asking the user for context they may have given before."
author = "jasper"

[runtime]
type = "python"
entry = "src/main.py"

[requirements]
capabilities = ["EnvRead(MEMEX_SERVER_URL)", "EnvRead(MEMEX_API_KEY)"]

# ─── Search & Discovery ───

[[tools.provided]]
name = "memex_note_search"
description = "Search source notes by hybrid retrieval (semantic + keyword + graph + temporal). Returns ranked notes with summaries. IMPORTANT: When answering knowledge questions, ALWAYS call this AND memex_memory_search together in the same tool-call batch."
input_schema = { type = "object", properties = { query = { type = "string", description = "Search query" }, vault_ids = { type = "array", items = { type = "string" }, description = "Vault names or UUIDs. Omit for defaults. Pass [\"*\"] for all." }, limit = { type = "integer", description = "Max notes (default 10)" }, strategies = { type = "array", items = { type = "string" }, description = "Retrieval strategies: semantic, keyword, graph, temporal. Default: all." }, after = { type = "string", description = "Only notes after this ISO 8601 date" }, before = { type = "string", description = "Only notes before this ISO 8601 date" }, tags = { type = "array", items = { type = "string" }, description = "Only notes with ALL of these tags" }, expand_query = { type = "boolean", description = "LLM-based multi-query expansion (default false)" }, has_assets = { type = "boolean", description = "Only notes with attached assets (default false)" } }, required = ["query"] }

[[tools.provided]]
name = "memex_memory_search"
description = "Search extracted facts, events, and observations across all notes. IMPORTANT: When answering knowledge questions, ALWAYS call this AND memex_note_search together in the same tool-call batch. Strategies: semantic (vector), keyword (BM25), graph (entity-centric), temporal (chronological), mental_model (synthesized). Default: all."
input_schema = { type = "object", properties = { query = { type = "string", description = "Search query" }, vault_ids = { type = "array", items = { type = "string" }, description = "Vault names or UUIDs. Omit for defaults." }, limit = { type = "integer", description = "Max results (default 10). Ignored when token_budget is set." }, token_budget = { type = "integer", description = "Token budget. Overrides limit — packs results greedily to budget." }, strategies = { type = "array", items = { type = "string" }, description = "Strategies: semantic, keyword, graph, temporal, mental_model. Default: all." }, after = { type = "string", description = "Only results after this ISO 8601 date" }, before = { type = "string", description = "Only results before this ISO 8601 date" }, tags = { type = "array", items = { type = "string" }, description = "Only results from notes with ALL of these tags" }, include_superseded = { type = "boolean", description = "Include superseded (low-confidence) memory units (default false)" }, source_context = { type = "string", description = "Filter by source context (e.g. 'user_notes')" } }, required = ["query"] }

[[tools.provided]]
name = "memex_find_note"
description = "Lightweight fuzzy title search. Returns matching note titles, IDs, and scores. Use when you know (part of) the title. For content search, use memex_note_search."
input_schema = { type = "object", properties = { query = { type = "string", description = "Title search query (partial or fuzzy match)" }, vault_ids = { type = "array", items = { type = "string" }, description = "Vault names or UUIDs" }, limit = { type = "integer", description = "Max results (default 5)" } }, required = ["query"] }

[[tools.provided]]
name = "memex_search_user_notes"
description = "Search only user-annotation memory units (user_notes frontmatter). Thin wrapper over memex_memory_search with source_context='user_notes'."
input_schema = { type = "object", properties = { query = { type = "string", description = "Search query" }, vault_ids = { type = "array", items = { type = "string" }, description = "Vault names or UUIDs" }, limit = { type = "integer", description = "Max results (default 10)" } }, required = ["query"] }

[[tools.provided]]
name = "memex_survey"
description = "Broad panoramic search. Decomposes a query into 3-5 sub-questions, runs them in parallel, deduplicates, and returns facts grouped by source note. Recommended for 'what do you know about X?' or 'overview of X' queries."
input_schema = { type = "object", properties = { query = { type = "string", description = "Broad query to decompose and search" }, vault_ids = { type = "array", items = { type = "string" }, description = "Vault names or UUIDs" }, limit_per_query = { type = "integer", description = "Max results per sub-query (default 10)" }, token_budget = { type = "integer", description = "Total token budget across all sub-queries" } }, required = ["query"] }

[[tools.provided]]
name = "memex_get_vault_summary"
description = "Returns the structured vault summary: narrative, themes, inventory stats, key entities. Used for vault orientation."
input_schema = { type = "object", properties = { vault_id = { type = "string", description = "Vault name or UUID. Omit for active vault." } }, required = [] }

# ─── Entity ───

[[tools.provided]]
name = "memex_list_entities"
description = "List or search entities in the knowledge graph. Without a query, returns top entities by relevance. Entity exploration workflow: 1) memex_list_entities → browse/search 2) memex_get_entities → details 3) memex_get_entity_cooccurrences → co-occurring entities 4) memex_get_entity_mentions → source facts."
input_schema = { type = "object", properties = { query = { type = "string", description = "Search term to filter by name" }, entity_type = { type = "string", description = "Filter: Person, Organization, Location, Concept, Technology, File, Misc" }, vault_id = { type = "string", description = "Vault name or UUID" }, limit = { type = "integer", description = "Max entities (default 20)" } }, required = [] }

[[tools.provided]]
name = "memex_get_entities"
description = "View details (name, type, mention count, description) of one or more entities by UUID."
input_schema = { type = "object", properties = { entity_ids = { type = "array", items = { type = "string" }, description = "Entity UUIDs" } }, required = ["entity_ids"] }

[[tools.provided]]
name = "memex_get_entity_cooccurrences"
description = "Find entities that frequently appear alongside a given entity — the fastest way to map relationships and discover connected concepts. Returns entity names, types, and co-occurrence counts inline."
input_schema = { type = "object", properties = { entity_id = { type = "string", description = "Entity UUID" }, limit = { type = "integer", description = "Max results (default 10)" } }, required = ["entity_id"] }

[[tools.provided]]
name = "memex_get_entity_mentions"
description = "Get facts, observations, and events that mention an entity. Each mention links to its source note, revealing cross-note connections."
input_schema = { type = "object", properties = { entity_id = { type = "string", description = "Entity UUID" }, limit = { type = "integer", description = "Max mentions (default 20)" } }, required = ["entity_id"] }

# ─── Note Add & Lifecycle ───

[[tools.provided]]
name = "memex_add_note"
description = "Add a note to Memex. All metadata fields are required and used for retrieval. YAML frontmatter is constructed automatically — do NOT include it in content."
input_schema = { type = "object", properties = { title = { type = "string", description = "Concise descriptive title (max 10 words)." }, author = { type = "string", description = "Author name (e.g. 'custom-assistant')." }, description = { type = "string", description = "One-sentence summary (max 250 words)." }, tags = { type = "array", items = { type = "string" }, description = "Tags for retrieval. Include author name and 1-3 topic tags." }, markdown_content = { type = "string", description = "Markdown body. Do NOT include YAML frontmatter — it is constructed automatically from the other fields." }, vault_id = { type = "string", description = "Target vault name or UUID. Omit for default." }, note_key = { type = "string", description = "Stable key for incremental updates (e.g. session:2026-04-06:topic)." }, user_notes = { type = "string", description = "Your own context or commentary about this note." }, background = { type = "boolean", description = "Queue ingestion in background (default true)." }, date = { type = "string", description = "ISO 8601 date for the note (default: today)." }, template = { type = "string", description = "Template slug to apply." } }, required = ["title", "author", "description", "tags", "markdown_content"] }

[[tools.provided]]
name = "memex_set_note_status"
description = "Set note lifecycle status. When superseded, all memory units are marked stale. Can link to the replacing note."
input_schema = { type = "object", properties = { note_id = { type = "string", description = "Note UUID" }, status = { type = "string", description = "Status: active, superseded, appended, archived" }, linked_note_id = { type = "string", description = "UUID of the replacing/linked note (optional)" } }, required = ["note_id", "status"] }

[[tools.provided]]
name = "memex_update_user_notes"
description = "Update user_notes frontmatter on an existing note and reprocess the memory graph. Pass null to delete all annotations."
input_schema = { type = "object", properties = { note_id = { type = "string", description = "Note UUID" }, user_notes = { type = "string", description = "New user notes text, or null to clear" } }, required = ["note_id"] }

[[tools.provided]]
name = "memex_rename_note"
description = "Rename a note. Updates title in metadata, page index, and doc_metadata."
input_schema = { type = "object", properties = { note_id = { type = "string", description = "Note UUID" }, new_title = { type = "string", description = "New title" } }, required = ["note_id", "new_title"] }

[[tools.provided]]
name = "memex_read_note"
description = "Read full note content. ONLY when total_tokens < 500. For longer notes: use memex_get_page_indices + memex_get_nodes instead."
input_schema = { type = "object", properties = { note_id = { type = "string", description = "Note UUID" }, vault_id = { type = "string", description = "Vault name or UUID" } }, required = ["note_id"] }

[[tools.provided]]
name = "memex_note_migrate"
description = "Move a note from one vault to another. The note is removed from the source vault and placed in the target vault."
input_schema = { type = "object", properties = { note_id = { type = "string", description = "Note UUID to migrate" }, target_vault = { type = "string", description = "Target vault name or UUID" } }, required = ["note_id", "target_vault"] }

# ─── Templates ───

[[tools.provided]]
name = "memex_get_template"
description = "Get a markdown template by slug. Use memex_list_templates first to see available templates."
input_schema = { type = "object", properties = { type = { type = "string", description = "Template slug (e.g. general_note, technical_brief, adr, rfc, quick_note)" } }, required = ["type"] }

[[tools.provided]]
name = "memex_list_templates"
description = "List all available note templates with metadata (slug, name, description, source)."
input_schema = { type = "object", properties = {}, required = [] }

[[tools.provided]]
name = "memex_register_template"
description = "Register a new note template from a TOML definition with name, description, and template fields."
input_schema = { type = "object", properties = { slug = { type = "string", description = "Template slug (lowercase, underscores)." }, name = { type = "string", description = "Human-readable template name." }, description = { type = "string", description = "One-line description." }, template = { type = "string", description = "Markdown content with YAML frontmatter." } }, required = ["slug", "template"] }

# ─── KV Store ───

[[tools.provided]]
name = "memex_kv_write"
description = "Write a fact to the KV store with semantic embedding. Key MUST start with app:openfang:<agent_name>: by default. Only use user: or global: if the user explicitly names that namespace."
input_schema = { type = "object", properties = { key = { type = "string", description = "Namespaced key (e.g. app:openfang:custom-assistant:preference)." }, value = { type = "string", description = "The fact or preference text to store." }, ttl_seconds = { type = "integer", description = "Optional TTL in seconds for auto-expiration." } }, required = ["key", "value"] }

[[tools.provided]]
name = "memex_kv_get"
description = "Get a fact by exact key from the KV store."
input_schema = { type = "object", properties = { key = { type = "string", description = "Exact key to look up." } }, required = ["key"] }

[[tools.provided]]
name = "memex_kv_list"
description = "List all facts in the KV store. Optionally filter by namespace prefixes."
input_schema = { type = "object", properties = { namespaces = { type = "array", items = { type = "string" }, description = "Filter by namespace prefixes (e.g. [\"user:\", \"global:\"])" }, pattern = { type = "string", description = "Wildcard filter (e.g. global:preferences:*). Only trailing * supported." } }, required = [] }

[[tools.provided]]
name = "memex_kv_search"
description = "Fuzzy semantic search over stored facts. Returns closest matching entries."
input_schema = { type = "object", properties = { query = { type = "string", description = "Search query text." }, namespaces = { type = "array", items = { type = "string" }, description = "Namespace prefixes to filter by." }, limit = { type = "integer", description = "Max results (default 5)." } }, required = ["query"] }

# ─── Note Reading ───

[[tools.provided]]
name = "memex_list_notes"
description = "List notes with optional date and tag filters. Use after/before for temporal queries like 'documents from last week'."
input_schema = { type = "object", properties = { vault_id = { type = "string", description = "Vault name or UUID. Omit for defaults." }, limit = { type = "integer", description = "Max notes (default 50)" }, after = { type = "string", description = "Only notes on/after this ISO 8601 date" }, before = { type = "string", description = "Only notes on/before this ISO 8601 date" }, tags = { type = "array", items = { type = "string" }, description = "Only notes with ALL of these tags" }, template = { type = "string", description = "Filter by template slug" }, status = { type = "string", description = "Filter by lifecycle status: active, superseded, appended, archived" } }, required = [] }

[[tools.provided]]
name = "memex_recent_notes"
description = "Browse recent notes. Use for browsing, NOT for discovery — use memex_note_search for discovery."
input_schema = { type = "object", properties = { vault_ids = { type = "array", items = { type = "string" }, description = "Vault names or UUIDs" }, limit = { type = "integer", description = "Max notes (default 20)" }, after = { type = "string", description = "Only notes on/after this ISO 8601 date" }, before = { type = "string", description = "Only notes on/before this ISO 8601 date" }, template = { type = "string", description = "Filter by template slug" } }, required = [] }

[[tools.provided]]
name = "memex_get_notes_metadata"
description = "Get metadata (title, tags, token count, has_assets) for one or more notes. Use after memex_memory_search to filter before reading. SKIP after memex_note_search (metadata already inline)."
input_schema = { type = "object", properties = { note_ids = { type = "array", items = { type = "string" }, description = "One or more Note UUIDs" } }, required = ["note_ids"] }

[[tools.provided]]
name = "memex_get_page_indices"
description = "Get TOC (section titles, summaries, node IDs, subtree_tokens) for one or more notes. Use depth=0 for top-level only, then drill into sections with parent_node_id. Pass leaf node IDs to memex_get_nodes."
input_schema = { type = "object", properties = { note_ids = { type = "array", items = { type = "string" }, description = "One or more Note UUIDs" }, depth = { type = "integer", description = "Max TOC depth (0 = top-level only, null = full tree)" }, parent_node_id = { type = "string", description = "Only return children of this node (for drilling into sections)" } }, required = ["note_ids"] }

[[tools.provided]]
name = "memex_get_nodes"
description = "Read one or more note sections by node ID. Get IDs from memex_get_page_indices. Batch multiple IDs in one call."
input_schema = { type = "object", properties = { node_ids = { type = "array", items = { type = "string" }, description = "One or more Node UUIDs from page-index output" } }, required = ["node_ids"] }

# ─── Assets ───

[[tools.provided]]
name = "memex_list_assets"
description = "List file assets (images, PDFs) attached to a note. REQUIRED when metadata shows has_assets: true. Feed paths to memex_get_resources."
input_schema = { type = "object", properties = { note_id = { type = "string", description = "Note UUID" }, vault_id = { type = "string", description = "Vault name or UUID" } }, required = ["note_id"] }

[[tools.provided]]
name = "memex_get_resources"
description = "Download one or more assets by path. Get paths from memex_list_assets. Saves to output_dir."
input_schema = { type = "object", properties = { paths = { type = "array", items = { type = "string" }, description = "Asset paths from memex_list_assets" }, output_dir = { type = "string", description = "Output directory (default /tmp/memex-assets)" } }, required = ["paths"] }

[[tools.provided]]
name = "memex_add_assets"
description = "Attach one or more files to an existing note."
input_schema = { type = "object", properties = { note_id = { type = "string", description = "Note UUID" }, file_paths = { type = "array", items = { type = "string" }, description = "Local file paths to attach" }, vault_id = { type = "string", description = "Vault name or UUID" } }, required = ["note_id", "file_paths"] }

[[tools.provided]]
name = "memex_delete_assets"
description = "Delete one or more asset files from an existing note."
input_schema = { type = "object", properties = { note_id = { type = "string", description = "Note UUID" }, asset_paths = { type = "array", items = { type = "string" }, description = "Asset paths to delete (from memex_list_assets)" }, vault_id = { type = "string", description = "Vault name or UUID" } }, required = ["note_id", "asset_paths"] }

# ─── Vaults ───

[[tools.provided]]
name = "memex_list_vaults"
description = "List all vaults with note counts and active status."
input_schema = { type = "object", properties = {}, required = [] }

[[tools.provided]]
name = "memex_active_vault"
description = "Returns active vault name/ID and configuration."
input_schema = { type = "object", properties = {}, required = [] }

# ─── Memory Units ───

[[tools.provided]]
name = "memex_get_memory_units"
description = "View one or more memory units by ID. Includes contradiction links and supersession info."
input_schema = { type = "object", properties = { unit_ids = { type = "array", items = { type = "string" }, description = "One or more memory unit UUIDs" } }, required = ["unit_ids"] }

[[tools.provided]]
name = "memex_get_lineage"
description = "Trace the provenance chain of a memory entity. UPSTREAM traces back to source documents (note → memory_unit → observation → mental_model). DOWNSTREAM traces forward to derived knowledge. BOTH returns the full tree."
input_schema = { type = "object", properties = { entity_type = { type = "string", description = "Entity type: mental_model, observation, memory_unit, or note" }, entity_id = { type = "string", description = "UUID of the entity" }, direction = { type = "string", description = "Traversal direction: upstream (default), downstream, or both" }, depth = { type = "integer", description = "Max recursion depth (default 3)" }, limit = { type = "integer", description = "Max children per node (default 5)" } }, required = ["entity_type", "entity_id"] }
