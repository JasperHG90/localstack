[skill]
name = "nomad"
version = "0.1.0"
description = "Nomad cluster API access. Provides tools to query jobs, allocations, nodes, and fetch task logs — bypassing shell_exec metacharacter restrictions."
author = "jasper"

[runtime]
type = "python"
entry = "src/main.py"

[requirements]
capabilities = []

# --- Allocation Tools ---

[[tools.provided]]
name = "nomad_alloc_logs"
description = "Fetch the last N lines of stdout or stderr for a task in a Nomad allocation. Defaults to 200 lines. Use this instead of shell_exec+curl for Nomad log endpoints."
input_schema = { type = "object", properties = { alloc_id = { type = "string", description = "Allocation ID (full or prefix)" }, task = { type = "string", description = "Task name within the allocation" }, log_type = { type = "string", description = "Log stream: stdout (default) or stderr" }, lines = { type = "integer", description = "Number of lines from the end to return (default 200)" } }, required = ["alloc_id", "task"] }

[[tools.provided]]
name = "nomad_alloc_status"
description = "Get full allocation detail including task states, events, and resource info."
input_schema = { type = "object", properties = { alloc_id = { type = "string", description = "Allocation ID (full or prefix)" } }, required = ["alloc_id"] }

[[tools.provided]]
name = "nomad_alloc_stats"
description = "Get real-time resource usage stats (CPU, memory) for an allocation and its tasks."
input_schema = { type = "object", properties = { alloc_id = { type = "string", description = "Allocation ID" } }, required = ["alloc_id"] }

# --- Job Tools ---

[[tools.provided]]
name = "nomad_job_list"
description = "List all jobs in the cluster with status and type."
input_schema = { type = "object", properties = { namespace = { type = "string", description = "Namespace (default: default)" } }, required = [] }

[[tools.provided]]
name = "nomad_job_status"
description = "Get full job specification and status."
input_schema = { type = "object", properties = { job_id = { type = "string", description = "Job ID" } }, required = ["job_id"] }

[[tools.provided]]
name = "nomad_job_summary"
description = "Get per-task-group summary with running/desired/failed counts."
input_schema = { type = "object", properties = { job_id = { type = "string", description = "Job ID" } }, required = ["job_id"] }

[[tools.provided]]
name = "nomad_job_allocs"
description = "List all allocations for a job with their status and task states."
input_schema = { type = "object", properties = { job_id = { type = "string", description = "Job ID" } }, required = ["job_id"] }

# --- Node Tools ---

[[tools.provided]]
name = "nomad_node_list"
description = "List all cluster nodes with status, eligibility, and drain state."
input_schema = { type = "object", properties = {}, required = [] }

[[tools.provided]]
name = "nomad_node_status"
description = "Get detailed node info including resources, drivers, and attributes."
input_schema = { type = "object", properties = { node_id = { type = "string", description = "Node ID" } }, required = ["node_id"] }

[[tools.provided]]
name = "nomad_node_allocs"
description = "List all allocations running on a specific node."
input_schema = { type = "object", properties = { node_id = { type = "string", description = "Node ID" } }, required = ["node_id"] }

# --- Evaluation Tools ---

[[tools.provided]]
name = "nomad_eval_list"
description = "List recent evaluations. Useful for finding blocked evals or scheduling failures."
input_schema = { type = "object", properties = { limit = { type = "integer", description = "Max evaluations to return (default 50)" } }, required = [] }

# --- Service Health ---

[[tools.provided]]
name = "nomad_consul_health"
description = "Check Consul service health. Returns critical/warning checks. Consul address defaults to http://192.168.2.30:8500."
input_schema = { type = "object", properties = { state = { type = "string", description = "Health state to filter: critical, warning, passing, any (default: critical)" }, consul_addr = { type = "string", description = "Consul HTTP address override" } }, required = [] }
